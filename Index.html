<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essverhalten Tracker</title>

<style>
:root{
    --bg:#f5f7fa;
    --card:#ffffff;
    --accent:#2d7ff9;
    --text:#222;
    --border:#ddd;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1,h2{
    margin-top:0;
}

.card{
    background:var(--card);
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,textarea,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:12px;
    border:1px solid var(--border);
    border-radius:8px;
}

button{
    background:var(--accent);
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.entry{
    border-bottom:1px solid #eee;
    padding:12px 0;
}

.entry:last-child{
    border-bottom:none;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
}

.stat{
    background:#eef4ff;
    padding:12px;
    border-radius:10px;
}

label{
    font-weight:bold;
}

.small{
    font-size:0.9em;
    color:#666;
}

.delete{
    background:#d9534f;
    margin-top:8px;
}

.checklist{
    display:grid;
    gap:8px;
}

.checkbox-row{
    display:flex;
    align-items:center;
    gap:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>🍽️ Essverhalten Tracker</h1>

<div class="card">
<h2>Neue Mahlzeit</h2>

<label>Beschreibung</label>
<textarea id="food"></textarea>

<label>Hunger vor dem Essen (1-10)</label>
<input type="number" id="hunger" min="1" max="10" step="0.5">

<label>Sättigung nach dem Essen (1-10)</label>
<input type="number" id="satiety" min="1" max="10" step="0.5">

<label>Stimmung</label>
<select id="mood">
<option>🙂 Gut</option>
<option>😐 Neutral</option>
<option>🙁 Schlecht</option>
<option>😴 Müde</option>
<option>😤 Gestresst</option>
</select>

<button onclick="saveMeal()">Speichern</button>
</div>

<div class="card">
<h2>Heute</h2>

<div class="checklist">

<div class="checkbox-row">
<input type="checkbox" id="sport" onchange="saveDaily()">
<label>Mini-Sportroutine erledigt</label>
</div>

<div class="checkbox-row">
<input type="checkbox" id="walk" onchange="saveDaily()">
<label>Spaziergang gemacht</label>
</div>

<div class="checkbox-row">
<input type="checkbox" id="water" onchange="saveDaily()">
<label>Ausreichend Wasser getrunken</label>
</div>

</div>
</div>

<div class="card">
<h2>Statistik</h2>

<div class="stats">
<div class="stat">
<div>Durchschnitt Hunger</div>
<strong id="avgHunger">-</strong>
</div>

<div class="stat">
<div>Durchschnitt Sättigung</div>
<strong id="avgSatiety">-</strong>
</div>

<div class="stat">
<div>Mahlzeiten gesamt</div>
<strong id="mealCount">-</strong>
</div>
</div>
</div>

<div class="card">
<h2>Mahlzeiten</h2>
<div id="entries"></div>
</div>

</div>

<script>

const STORAGE_KEY = "foodTrackerMeals";
const DAILY_KEY = "foodTrackerDaily";

function getMeals(){
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveMeal(){

    const food = document.getElementById("food").value.trim();

    if(!food){
        alert("Bitte Beschreibung eingeben");
        return;
    }

    const meal = {
        id: Date.now(),
        date: new Date().toLocaleString("de-DE"),
        food,
        hunger: parseFloat(document.getElementById("hunger").value || 0),
        satiety: parseFloat(document.getElementById("satiety").value || 0),
        mood: document.getElementById("mood").value
    };

    const meals = getMeals();
    meals.unshift(meal);

    localStorage.setItem(STORAGE_KEY, JSON.stringify(meals));

    document.getElementById("food").value="";
    document.getElementById("hunger").value="";
    document.getElementById("satiety").value="";

    render();
}

function deleteMeal(id){

    let meals = getMeals();
    meals = meals.filter(m=>m.id!==id);

    localStorage.setItem(STORAGE_KEY, JSON.stringify(meals));

    render();
}

function render(){

    const meals = getMeals();

    const entries = document.getElementById("entries");

    entries.innerHTML="";

    meals.forEach(meal=>{

        entries.innerHTML += `
        <div class="entry">
            <strong>${meal.food}</strong><br>
            <span class="small">${meal.date}</span><br>
            Hunger: ${meal.hunger}<br>
            Sättigung: ${meal.satiety}<br>
            Stimmung: ${meal.mood}<br>
            <button class="delete" onclick="deleteMeal(${meal.id})">
                Löschen
            </button>
        </div>
        `;
    });

    const avgHunger =
        meals.length ?
        (meals.reduce((a,b)=>a+b.hunger,0)/meals.length).toFixed(1)
        : "-";

    const avgSatiety =
        meals.length ?
        (meals.reduce((a,b)=>a+b.satiety,0)/meals.length).toFixed(1)
        : "-";

    document.getElementById("avgHunger").textContent = avgHunger;
    document.getElementById("avgSatiety").textContent = avgSatiety;
    document.getElementById("mealCount").textContent = meals.length;
}

function saveDaily(){

    const data = {
        sport: document.getElementById("sport").checked,
        walk: document.getElementById("walk").checked,
        water: document.getElementById("water").checked
    };

    localStorage.setItem(DAILY_KEY, JSON.stringify(data));
}

function loadDaily(){

    const data =
        JSON.parse(localStorage.getItem(DAILY_KEY) || "{}");

    document.getElementById("sport").checked = data.sport || false;
    document.getElementById("walk").checked = data.walk || false;
    document.getElementById("water").checked = data.water || false;
}

loadDaily();
render();

</script>

</body>
</html>
