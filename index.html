<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EssTracker V2</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:16px;color:#222}
.container{max-width:900px;margin:auto}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1,h2{margin-top:0}
input,textarea,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin:6px 0 12px}
button{background:#2d7ff9;color:#fff;border:none;padding:12px 16px;border-radius:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:#eef4ff;padding:12px;border-radius:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rangeval{font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>🍽️ EssTracker V2</h1>

<div class="card">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat">Gewicht<br><strong id="latestWeight">-</strong></div>
<div class="stat">Mahlzeiten<br><strong id="mealCount">0</strong></div>
<div class="stat">Ø Hunger<br><strong id="avgHunger">-</strong></div>
<div class="stat">Ø Sättigung<br><strong id="avgSatiety">-</strong></div>
</div>
</div>

<div class="card">
<h2>Gewicht erfassen</h2>
<input type="number" step="0.1" id="weight" placeholder="z.B. 115.0">
<button onclick="saveWeight()">Gewicht speichern</button>
</div>

<div class="card">
<h2>Neue Mahlzeit</h2>
<textarea id="food" placeholder="Was hast du gegessen?"></textarea>

<label>Hunger: <span id="hungerVal">5</span></label>
<input type="range" min="1" max="10" step="0.5" value="5" id="hunger" oninput="hungerVal.textContent=this.value">

<label>Sättigung: <span id="satietyVal">7</span></label>
<input type="range" min="1" max="10" step="0.5" value="7" id="satiety" oninput="satietyVal.textContent=this.value">

<select id="mood">
<option>😊 Gut</option>
<option>😐 Neutral</option>
<option>😤 Gestresst</option>
<option>😔 Schlecht</option>
</select>

<label><input type="checkbox" id="craving"> Heißhunger</label><br><br>

<label>Genuss (1-10)</label>
<input type="number" min="1" max="10" id="enjoyment">

<label>Gesundheit (1-10)</label>
<input type="number" min="1" max="10" id="health">

<label>Portionsgefühl (1-10)</label>
<input type="number" min="1" max="10" id="portion">

<button onclick="saveMeal()">Mahlzeit speichern</button>
</div>

<div class="card">
<h2>Heute</h2>
<label><input type="checkbox" id="water"> Wasserziel erreicht</label><br>
<label><input type="checkbox" id="walk"> Spaziergang</label><br>
<label><input type="checkbox" id="sport"> Mini-Sportroutine</label>
</div>

<div class="card">
<h2>Erkenntnisse</h2>
<div id="insights">Noch nicht genügend Daten vorhanden.</div>
</div>

<div class="card">
<h2>Mahlzeiten</h2>
<div id="meals"></div>
</div>

</div>

<script>
const mealsKey="et_v2_meals";
const weightsKey="et_v2_weights";

function meals(){return JSON.parse(localStorage.getItem(mealsKey)||"[]")}
function weights(){return JSON.parse(localStorage.getItem(weightsKey)||"[]")}

function saveMeal(){
 const data=meals();
 data.unshift({
  date:new Date().toLocaleString("de-DE"),
  food:food.value,
  hunger:+hunger.value,
  satiety:+satiety.value,
  mood:mood.value,
  craving:craving.checked,
  enjoyment:+(enjoyment.value||0),
  health:+(health.value||0),
  portion:+(portion.value||0)
 });
 localStorage.setItem(mealsKey,JSON.stringify(data));
 food.value="";
 render();
}

function saveWeight(){
 const data=weights();
 data.unshift({date:new Date().toLocaleDateString("de-DE"),weight:+weight.value});
 localStorage.setItem(weightsKey,JSON.stringify(data));
 weight.value="";
 render();
}

function render(){
 const m=meals();
 mealCount.textContent=m.length;

 if(m.length){
  avgHunger.textContent=(m.reduce((a,b)=>a+b.hunger,0)/m.length).toFixed(1);
  avgSatiety.textContent=(m.reduce((a,b)=>a+b.satiety,0)/m.length).toFixed(1);
 }

 const w=weights();
 latestWeight.textContent=w.length? w[0].weight+" kg":"-";

 meals.innerHTML=m.map(x=>`
 <div style="border-bottom:1px solid #ddd;padding:8px 0">
 <strong>${x.food}</strong><br>
 ${x.date}<br>
 Hunger ${x.hunger} | Sättigung ${x.satiety}<br>
 ${x.mood} ${x.craving?"🔥 Heißhunger":""}
 </div>`).join("");

 if(m.length>=3){
   const avg=(m.reduce((a,b)=>a+b.hunger,0)/m.length).toFixed(1);
   insights.innerHTML=`Du isst durchschnittlich bei Hunger <b>${avg}</b>.`;
 }
}
render();
</script>
</body>
</html>
