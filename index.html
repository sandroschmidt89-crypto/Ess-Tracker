<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EssTracker V3</title>
<style>
body{margin:0;font-family:system-ui;background:#f3f5f7;color:#222}
.container{max-width:900px;margin:auto;padding:12px}
.card{background:#fff;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1,h2{margin-top:0}
input,textarea,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:10px;margin:6px 0 12px;box-sizing:border-box}
button{background:#2563eb;color:#fff;border:none;border-radius:10px;padding:12px 16px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat{background:#eef4ff;padding:12px;border-radius:12px}
canvas{background:#fff;border-radius:10px;width:100%}
.meal{border-bottom:1px solid #ddd;padding:8px 0}
.small{color:#666;font-size:.9em}
</style>
</head>
<body>
<div class="container">
<h1>🍽️ EssTracker V3</h1>

<div class="card">
<h2>Dashboard</h2>
<div class="grid">
<div class="stat">Gewicht<br><b id="latestWeight">-</b></div>
<div class="stat">Trend<br><b id="trend">-</b></div>
<div class="stat">Mahlzeiten<br><b id="mealCount">0</b></div>
<div class="stat">Heißhunger<br><b id="cravingRate">0%</b></div>
</div>
</div>

<div class="card">
<h2>Gewicht</h2>
<input id="weight" type="number" step="0.1" placeholder="115.0">
<button onclick="saveWeight()">Speichern</button>
<canvas id="weightChart" height="160"></canvas>
</div>

<div class="card">
<h2>Mahlzeit</h2>
<textarea id="food" placeholder="Was hast du gegessen?"></textarea>

<label>Hunger <span id="hv">5</span></label>
<input type="range" id="hunger" min="1" max="10" step="0.5" value="5" oninput="hv.textContent=this.value">

<label>Sättigung <span id="sv">7</span></label>
<input type="range" id="satiety" min="1" max="10" step="0.5" value="7" oninput="sv.textContent=this.value">

<select id="mood">
<option>😊 Gut</option>
<option>😐 Neutral</option>
<option>😤 Gestresst</option>
<option>😔 Schlecht</option>
</select>

<label><input type="checkbox" id="craving"> Heißhunger</label>

<input id="enjoyment" type="number" min="1" max="10" placeholder="Genuss 1-10">
<input id="health" type="number" min="1" max="10" placeholder="Gesundheit 1-10">
<input id="portion" type="number" min="1" max="10" placeholder="Portionsgefühl 1-10">

<button onclick="saveMeal()">Mahlzeit speichern</button>
</div>

<div class="card">
<h2>Gewohnheiten</h2>
<label><input type="checkbox" id="water"> Wasserziel erreicht</label><br>
<label><input type="checkbox" id="walk"> Spaziergang</label><br>
<label><input type="checkbox" id="sport"> Mini-Sport</label>
</div>

<div class="card">
<h2>Erkenntnisse</h2>
<div id="insights">Noch nicht genügend Daten.</div>
</div>

<div class="card">
<h2>Mahlzeitenverlauf</h2>
<div id="mealList"></div>
</div>

</div>

<script>
const MK='v3_meals', WK='v3_weights';

const meals=()=>JSON.parse(localStorage.getItem(MK)||'[]');
const weights=()=>JSON.parse(localStorage.getItem(WK)||'[]');

function saveMeal(){
 let m=meals();
 m.unshift({
  food:food.value,date:new Date().toLocaleString('de-DE'),
  hunger:+hunger.value,satiety:+satiety.value,
  mood:mood.value,craving:craving.checked,
  enjoyment:+(enjoyment.value||0),
  health:+(health.value||0),
  portion:+(portion.value||0)
 });
 localStorage.setItem(MK,JSON.stringify(m));
 food.value='';
 render();
}

function saveWeight(){
 let w=weights();
 w.unshift({d:new Date().toLocaleDateString('de-DE'),v:+weight.value});
 localStorage.setItem(WK,JSON.stringify(w));
 weight.value='';
 render();
}

function drawChart(){
 const c=document.getElementById('weightChart');
 const ctx=c.getContext('2d');
 ctx.clearRect(0,0,c.width,c.height);
 const w=weights().slice().reverse();
 if(w.length<2) return;

 const vals=w.map(x=>x.v);
 const min=Math.min(...vals), max=Math.max(...vals);
 const pad=10;

 ctx.beginPath();
 w.forEach((p,i)=>{
   let x=(i/(w.length-1))*(c.width-20)+10;
   let y=c.height-pad-((p.v-min)/((max-min)||1))*(c.height-20);
   if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
 });
 ctx.stroke();
}

function render(){
 const m=meals(), w=weights();

 mealCount.textContent=m.length;
 latestWeight.textContent=w.length ? w[0].v+' kg':'-';

 if(w.length>=2){
   let diff=(w[0].v-w[w.length-1].v).toFixed(1);
   trend.textContent=(diff>0?'+':'')+diff+' kg';
 }

 if(m.length){
   cravingRate.textContent=Math.round((m.filter(x=>x.craving).length/m.length)*100)+'%';
 }

 mealList.innerHTML=m.map(x=>`
 <div class="meal">
 <b>${x.food}</b><br>
 <span class="small">${x.date}</span><br>
 Hunger ${x.hunger} | Sättigung ${x.satiety}
 ${x.craving?'🔥':''}
 </div>`).join('');

 let txt=[];
 if(m.length>=5){
   let avg=(m.reduce((a,b)=>a+b.hunger,0)/m.length).toFixed(1);
   txt.push('Durchschnittlicher Essbeginn bei Hunger '+avg+'.');
 }
 let stressed=m.filter(x=>x.mood.includes('Gestresst') && x.craving).length;
 if(stressed>0) txt.push('Heißhunger tritt mindestens teilweise an gestressten Tagen auf.');
 insights.innerHTML=txt.length?txt.join('<br><br>'):'Noch nicht genügend Daten.';

 drawChart();
}
render();
</script>
</body>
</html>
